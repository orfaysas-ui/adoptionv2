name: Build Windows EXE — Adoption

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas openpyxl pyinstaller

      - name: Build EXE
        run: pyinstaller butler_adoption.spec

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ButlerAdoption-Windows
          path: dist/ButlerAdoption.exe
          retention-days: 30
